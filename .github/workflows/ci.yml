name: CI

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore dependencies
      run: msbuild JulesClient.sln /t:Restore /p:Configuration=Release

    - name: Build
      run: msbuild JulesClient.sln /p:Configuration=Release

    - name: Check formatting
      run: dotnet format JulesClient.sln --verify-no-changes --no-restore
